<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Walk for Green+ — A smart campus mobility app for CUHK. Earn PE credits, track steps, and redeem rewards.">
<meta name="theme-color" content="#D5E3B3">
<meta property="og:title" content="WFG+ · Walk for Green Plus">
<meta property="og:description" content="Every campus step earns PE credits and real rewards.">
<meta property="og:type" content="website">
<title>WFG+ · Walk for Green Plus</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238DB255' stroke-width='2.5' stroke-linecap='round'%3E%3Cpath d='M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1.41-4.24C10 16 14 12 17 8zM17 8c3-2 5-4 5-7-3 0-5 2-7 5'/%3E%3C/svg%3E">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #C3D49C;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }

  /* Loading overlay */
  .wfg-loading {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #D5E3B3;
    z-index: 9999;
    gap: 20px;
  }
  .wfg-loading-logo {
    width: 64px;
    height: 64px;
    border-radius: 20px;
    background: #1C1C1E;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: wfg-pulse 1.4s ease-in-out infinite;
  }
  .wfg-loading-text {
    font-size: 12px;
    font-weight: 700;
    color: #4A6B20;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  @keyframes wfg-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  /* Screen transition animations (used by the app) */
  @keyframes slide-in-right {
    from { transform: translateX(100%); opacity: 0.8; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes slide-out-left {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(-20%); opacity: 0.7; }
  }
  @keyframes slide-in-left {
    from { transform: translateX(-100%); opacity: 0.8; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes slide-out-right {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(20%); opacity: 0.7; }
  }
  .te-left  { animation: slide-in-right 0.4s cubic-bezier(.22,1,.36,1) both; }
  .tx-left  { animation: slide-out-left 0.4s cubic-bezier(.22,1,.36,1) both; }
  .te-right { animation: slide-in-left 0.4s cubic-bezier(.22,1,.36,1) both; }
  .tx-right { animation: slide-out-right 0.4s cubic-bezier(.22,1,.36,1) both; }

  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { display: none; }
  * { scrollbar-width: none; }

  button, [role="button"] {
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
</style>
</head>
<body>

<div id="root">
  <div class="wfg-loading">
    <div class="wfg-loading-logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#8DB255" stroke-width="2.5" stroke-linecap="round">
        <path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1.41-4.24C10 16 14 12 17 8zM17 8c3-2 5-4 5-7-3 0-5 2-7 5"/>
      </svg>
    </div>
    <div class="wfg-loading-text">Loading WFG+</div>
  </div>
</div>

<!-- React 18 + Babel for in-browser JSX compilation -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Expose React hooks globally before the JSX file runs -->
<script>
  const { useState, useEffect, useRef, useCallback } = React;
</script>

<!-- Prototype source -->
<script type="text/babel" data-presets="react" src="./wfg-plus-v5.jsx"></script>

<!-- Mount the app once it's loaded -->
<script type="text/babel" data-presets="react">
  (function mount() {
    if (typeof WFGv5 !== 'undefined') {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<WFGv5 />);
    } else {
      setTimeout(mount, 50);
    }
  })();
</script>

</body>
</html>
